version: '3.8'

services:
  # ============================================================
  # LED System Lens Simulation
  # アクセス: http://localhost:3005/
  # ============================================================
  lens-simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lens-simulation
    ports:
      - "3005:80"
    restart: always
    networks:
      - web-network

networks:
  web-network:
    external: true
    name: my-web-server-network
