server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Portal
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lens Simulation
    location /lens-simulation {
        try_files $uri $uri/ /lens-simulation/index.html;
    }

    # Flickr
    location /flickr {
        try_files $uri $uri/ /flickr/index.html;
    }

    # Service Worker caching (PWA用) - キャッシュさせない
    location ~* (sw\.js|service-worker\.js|workbox-.*\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    # 静的アセットのキャッシュ
    location ~* \.(?:css|js|jpg|svg|png|webp|ico|woff2?|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
