services:
  # ============================================================
  # LED System (Unified)
  # アクセス: 
  # - http://localhost:3004/ (Portal)
  # - http://localhost:3004/lens-simulation/ (Lens Simulation)
  # - http://localhost:3004/flickr/ (Flickr)
  # ============================================================
  led-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: led-system
    ports:
      - "3004:80"
    restart: always
    networks:
      web-network:
        aliases:
          - portal
          - lens-simulation
          - flickr

networks:
  web-network:
    external: true
    name: my-web-server-network
